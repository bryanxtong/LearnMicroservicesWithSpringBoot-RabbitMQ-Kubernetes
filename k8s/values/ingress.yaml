# Main Ingress Configuration
# Routes traffic to backend services with path rewriting
# - /api/* → gateway (rewrite to /*)
# - /rabbitmq/* → rabbitmq (rewrite to /*)
# - /* → frontend (catch-all)
#
# Note: Grafana is configured in a separate ingress without rewriting

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

workload:
  type: Deployment

service:
  enabled: false

ingress:
  enabled: true
  host: localhost
  # Rewrite target: strips the path prefix before forwarding
  # Example: /api/foo → /foo, /rabbitmq/bar → /bar
  rewriteTarget: "/$2"
  paths:
    - path: /api(/|$)(.*)
      service: gateway
      port: 8000
    - path: /rabbitmq(/|$)(.*)
      service: rabbitmq
      port: 15672
    - path: /()(.*)  # Catch-all: matches everything else
      service: frontend
      port: 80

env: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
