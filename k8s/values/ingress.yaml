# Main Ingress Configuration
# Routes traffic to backend services with path rewriting
# - /api/* → gateway (rewrite to /*)
# - /rabbitmq/* → rabbitmq (rewrite to /*)
# - /* → frontend (catch-all)
#
# Note: Grafana is configured in a separate ingress without rewriting

# Disable workload creation - this release only creates Ingress resources
workload:
  type: ""

service:
  enabled: false

ingress:
  enabled: true
  host: localhost
  # Rewrite target: strips the path prefix before forwarding
  # Example: /api/foo → /foo, /rabbitmq/bar → /bar, /consul/foo → /ui/foo
  rewriteTarget: "/$2"
  paths:
    - path: /api(/|$)(.*)
      service: gateway
      port: 8000
    - path: /rabbitmq(/|$)(.*)
      service: rabbitmq
      port: 15672
    - path: /consul(/|$)(.*)
      service: consul-server
      port: 8500
    - path: /()(.*)
      service: frontend
      port: 80

env: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
