image:
  repository: challenges-frontend
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  port: 80

livenessProbe:
  httpPath: /
  initialDelaySeconds: 5
  failureThreshold: 3

readinessProbe:
  httpPath: /
  initialDelaySeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
