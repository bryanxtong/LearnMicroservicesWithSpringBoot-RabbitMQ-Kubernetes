image:
  repository: challenges-frontend
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  port: 80

livenessProbe:
  httpPath: /
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpPath: /
  initialDelaySeconds: 30
  timeoutSeconds: 5
  periodSeconds: 10
  failureThreshold: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
