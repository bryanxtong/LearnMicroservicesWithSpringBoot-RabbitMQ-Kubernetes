# kind cluster config
# Port mappings: host → kind node (for Ingress + extra UIs)
#
# Access map:
#   http://localhost      → Ingress → frontend (React)
#   http://localhost/api/ → Ingress → gateway  (Spring Cloud Gateway)
#   http://localhost:8500 → Consul UI  (NodePort)
#   http://localhost:15672→ RabbitMQ Management (NodePort)
#   http://localhost:3001 → Grafana / otel-lgtm  (NodePort)
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Ingress HTTP  → localhost:80
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # Ingress HTTPS → localhost:443
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Consul UI
      - containerPort: 30850
        hostPort: 8500
        protocol: TCP
      # RabbitMQ Management
      - containerPort: 31672
        hostPort: 15672
        protocol: TCP
      # Grafana (otel-lgtm)
      - containerPort: 30001
        hostPort: 3001
        protocol: TCP
